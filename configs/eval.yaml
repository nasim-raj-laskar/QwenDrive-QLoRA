evaluation:
  # Sample sizes for different metrics
  perplexity_samples: 10
  generation_samples: 5
  performance_samples: 3
  
  # Generation parameters
  max_new_tokens_quality: 10
  max_new_tokens_performance: 20
  
  # Model parameters
  max_seq_length: 512
  do_sample: false
  temperature: 0.1
  
  # Data parameters
  test_seed: 123
  data_file: "data/automotive_en_dataset.jsonl"
  
  # LLM-as-a-Judge evaluation
  llm_judge:
    enabled: true
    samples: 12  # Use all samples from eval_prompts.jsonl
    api_key_env: "GROQ_API"
    dimensions:
      - helpfulness
      - correctness
      - coherence
      - instruction_following
      - hallucination_risk
      - safety