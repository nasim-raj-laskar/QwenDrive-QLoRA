evaluation:
  # Sample sizes for different metrics
  perplexity_samples: 10
  generation_samples: 5
  performance_samples: 3
  
  # Generation parameters
  max_new_tokens_quality: 10
  max_new_tokens_performance: 20
  
  # Model parameters
  max_seq_length: 512
  do_sample: false
  temperature: 0.1
  
  # Data parameters
  test_seed: 123
  data_file: "data/automotive_en_dataset.jsonl"
  
  # LLM-as-a-Judge evaluation
  llm_judge:
    enabled: true
    model: "llama-3.3-70b-versatile"
    api_base_url: "https://api.groq.com/openai/v1/chat/completions"
    api_key_env: "GROQ_API"
    prompts_dir: "prompts"
    samples: 12
    max_new_tokens: 300
    temperature: 0.1
    timeout: 30
    dimensions:
      - helpfulness
      - correctness
      - coherence
      - instruction_following
      - hallucination_risk
      - safety
  
  # Category evaluation
  category_eval:
    enabled: true
    prompts_file: "data/eval_prompts.jsonl"
    max_new_tokens: 100
  
  # Pairwise comparison evaluation
  pairwise_eval:
    enabled: true  # Enable for testing
    samples: 5
    max_new_tokens: 50